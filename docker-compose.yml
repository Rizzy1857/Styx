version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: styx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d styx"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-services:
    image: python:3.11-slim
    volumes:
      - ./backend:/app
    working_dir: /app
    command: >
      bash -c "pip install fastapi uvicorn[standard] && python scripts/mock_services.py"
    ports:
      - "8001:8001"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - mock-services

volumes:
  postgres_data:
